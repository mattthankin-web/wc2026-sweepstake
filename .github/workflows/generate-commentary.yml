22:35
Line 13 tells us exactly what's wrong:

/home/runner/work/wc2026-sweepstake/wc2026-sweepstake/scripts/fetch_scores.py: No such file or directory
The path is doubled — wc2026-sweepstake/wc2026-sweepstake/scripts/.... This means when you uploaded the zip, it created a folder inside a folder. Your repo structure looks like this:

wc2026-sweepstake/        ← extra outer folder
  wc2026-sweepstake/      ← the actual files are in here
    scripts/
    data/
    index.html
When GitHub Actions checks out the repo, it expects scripts/fetch_scores.py at the root level, not inside a subfolder.

Fix — two options:

Option A (easiest) — move the files up in GitHub:

Go to your repo on GitHub
Click into the inner wc2026-sweepstake folder
For each file (index.html, data/, scripts/, _config.yml, .nojekyll, README.md), open it, click the pencil to edit, then in the filename box at the top backspace to remove the wc2026-sweepstake/ prefix and commit
Option B (fastest) — delete the repo and re-upload correctly:

Settings → scroll to bottom → Delete repository
Create a new repo called wc2026-sweepstake
This time when uploading, go inside the zip first, then upload the contents directly — not the outer folder itself
Option B is quicker. The root of your repo should show index.html, data/, scripts/, .github/ directly — not another wc2026-sweepstake/ folder.







