name: Fetch Scores

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== ALL FILES ==="
          find . -type f | sort
