name: Fetch Scores

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data/data.json'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch scores and odds
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_scores.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "chore: scores + odds $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
            echo "Pushed updated data.json"
          fi
